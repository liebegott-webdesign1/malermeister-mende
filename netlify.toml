# Netlify-Build fuer die Tina-/Next.js-App
# Der geheime TINA_TOKEN wird NICHT hier hinterlegt, sondern im Netlify-Dashboard
# (Site settings -> Environment variables), damit er nicht oeffentlich im Repo steht.

[build]
  # build-local: baut die statische Seite aus den Repo-Inhalten (lokaler Datalayer),
  # entkoppelt vom Tina-Cloud-Schema-Check. Bringt die OEFFENTLICHE Seite zuverlaessig live.
  # Online-Editieren via /admin folgt, sobald der Tina-Cloud-Schema-Sync sauber ist
  # -> dann zurueck auf "npm run build".
  command = "npm run build-local"
  publish = "out"

[build.environment]
  # NEXT_PUBLIC_* sind ohnehin oeffentlich (landen im Browser-Bundle) -> hier ok:
  NEXT_PUBLIC_TINA_CLIENT_ID = "fca7a863-35b8-4820-8179-37bc7f898b74"
  NEXT_PUBLIC_TINA_BRANCH = "main"
  # Tinas lokales Indexieren braucht mehr Heap als Nodes Default (~2 GB) -> sonst OOM (exit 134)
  NODE_OPTIONS = "--max-old-space-size=4096"
