# Netlify-Build fuer die Tina-/Next.js-App
# Der geheime TINA_TOKEN wird NICHT hier hinterlegt, sondern im Netlify-Dashboard
# (Site settings -> Environment variables), damit er nicht oeffentlich im Repo steht.

[build]
  command = "npm run build"

[build.environment]
  # NEXT_PUBLIC_* sind ohnehin oeffentlich (landen im Browser-Bundle) -> hier ok:
  NEXT_PUBLIC_TINA_CLIENT_ID = "fca7a863-35b8-4820-8179-37bc7f898b74"
  NEXT_PUBLIC_TINA_BRANCH = "main"
